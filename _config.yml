title: "Eco Life Style"
description: "Ekologiczny styl życia dla każdego. Zero waste, zielona energia, eko produkty i świadome decyzje zakupowe."
url: "https://effectiveone.github.io"
baseurl: "/eco-lifestyle"
lang: pl

remote_theme: daattali/beautiful-jekyll@6.0.1

timezone: Europe/Warsaw

author: "Redakcja Eco Life Style"
avatar: ""
social-share: false

navbar-links:
  O nas: "o-nas"
  Eco: "tags#eco"

plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

paginate: 8
paginate_path: "/page:num/"
permalink: /:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "Redakcja Eco Life Style"
      show-avatar: false

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile.lock
  - vendor/
